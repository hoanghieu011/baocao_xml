<div class="container mt-5">
  <div class="change-password-container">
    <h5 class="text-center">{{'MENU.DOI_MAT_KHAU'|translate}}</h5>

    <div class="mb-3">
      <label for="email" class="form-label">{{'MA_NV'|translate}}:</label>
      <input type="text" id="email" class="form-control" [value]="email" readonly />
    </div>

    <form (ngSubmit)="changePassword($event)">
      <div class="mb-3">
        <label for="oldPassword" class="form-label">{{'MAT_KHAU_CU'|translate}}:</label>
        <input name="oldPassword" [(ngModel)]="oldPassword" type="password" id="oldPassword"
          (change)="onOldPasswordChange($event)" class="form-control" required />
      </div>
      <div class="mb-3">
        <label for="newPassword" class="form-label">{{'MAT_KHAU_MOI'|translate}}:</label>
        <input name="newPassword" [(ngModel)]="newPassword" type="password" id="newPassword"
          (change)="onNewPasswordChange($event)" class="form-control" required />
      </div>
      <div class="mb-3">
        <label for="confirmPassword" class="form-label">{{'NHAP_LAI_MAT_KHAU_MOI'|translate}}:</label>
        <input name="confirmPassword" [(ngModel)]="confirmPassword" type="password" id="confirmPassword"
          (change)="onConfirmPasswordChange($event)" class="form-control" required />
      </div>
    </form>
    <div *ngIf="message" class="success-message">{{ message |translate }}</div>
    <div *ngIf="error" class="error-message">{{ error | translate}}</div>
    <button class="btn btn-primary w-100" (click)="changePassword($event)">{{'MENU.DOI_MAT_KHAU'|translate}}</button>
  </div>
</div>
